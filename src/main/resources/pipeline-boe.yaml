infrastructure:
  eventBus:
    type: IN_MEMORY

  inbox:
    type: FILE_SYSTEM
    configuration:
      path: "D:/spool/inbox"

  dataLake:
    type: FILE_SYSTEM
    configuration:
      path: "D:/spool/datalake"

modules:
  - crawler:
      type: POLL
      id: boe-crawler
      source:
        type: BOE_HTTP
        configuration:
          sourceId: boe
          url: "https://boe.es/datosabiertos/api/boe/sumario/20260602"
          scheduleMilliseconds: 0
        rootPath: data.sumario.diario.0.items
        mediaType: BOE_JSON_ARRAY
      eventMapping:
        namingConvention: SNAKE_CASE
        domainMappingList:
          - BoeItem

  - ingester:
      id: boe-ingester
      type: REACTIVE

  - janitor:
      id: boe-janitor
      configuration:
        milliseconds: 1000
        millisecondsThreshold: 10000
        millisecondsTTL: 100000