infrastructure:
  watchdog: "http://host.docker.internal:8090"

  eventBus:
    type: IN_MEMORY

  inbox:
    type: FILE_SYSTEM
    configuration:
      path: "D:/spool/inbox"

  dataLake:
    type: FILE_SYSTEM
    configuration:
      path: "D:/spool/datalake"

modules:
  - crawler:
      type: POLL
      id: synthea-crawler
      source:
        type: HTTP
        configuration:
          sourceId: synthea-api
          url: "http://plytrox.com:8000/events?limit=20"
          scheduleMilliseconds: 60000
        mediaType: JSON_ARRAY
        rootPath: events
      eventMapping:
        namingConvention: SNAKE_CASE
        attributeList:
          - _type

  - ingester:
      id: synthea-ingester
      type: REACTIVE

  - janitor:
      id: synthea-janitor
      configuration:
        milliseconds: 60000
        millisecondsThreshold: 10000
        millisecondsTTL: 30000